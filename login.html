<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="./login+register.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/vermiLogo.png" type="image/x-icon">

</head>
<body>
    <header>
        <div class="headerIzquierdo">
            <img src="assets/vermiLogo.png" alt="Logotipo Vermi" class="logoNav">
            <p>Vermi</p>
        </div>
        <nav class="headerCentral">
            
        </nav>
    </header>
    <main>
        <span class="titulo">Iniciar Sesión</span>
        <section class="box-form">
            <div class="form">
                <form action="" method="POST">
                    <section class="form-content">
                        <input type="text" id="usuario" class="user" placeholder="Usuario"><br><br>
                        <input type="password" id="password" class="password" placeholder="Contraseña"><br><br>
                        <button type="submit"class="enviar">Enviar</button>
                    </section>
                </form>
                <p class="registro">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
            </div>
        </section>
    </main>
    <footer>
        <div id="paginasFooter">
            <a href="">Sobre Vermi</a>
            <a href="">Contacta con nosotros</a>
            <a href="">Política de privacidad</a>
        </div>

        <div id="logoYCopyFooter">
            <div class="Logo-eslogan-footer">
                <img src="assets/vermiLogo.png" alt="logo" id="logo-footer">
                <div id="textoLogo">
                    <p>VERMI</p>
                    <p>Recuerda en voz alta</p>
                </div>
            </div>
            <p>© Todos los derechos reservados.</p>
        </div>
    </footer>

</body>
</html>
