<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir nuevo recuerdo - Vermi</title>
    <link rel="stylesheet" href="publicar.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="assets/vermiLogo.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="headerIzquierdo">
            <img src="assets/vermiLogo.png" alt="Logotipo Vermi" class="logoNav">
            <span>Vermi</span>
        </div>
        <nav class="headerCentral">
            <ul>
                <li class="pagina"><a href="#">Inicio</a></li>
                <li class="paginaActual"><a href="#">Publicar</a></li>
                <li class="pagina"><a href="#">Amigos</a></li>
                <li class="pagina"><a href="#">Mi perfil</a></li>
            </ul>
        </nav>
    </header>


    <div id="contenido">

        <h1>Sube un recuerdo</h1>

        <form action="publicar.php" method="POST" id="formPublicar">

            <label for="visibilidad">Visibilidad</label>

            <select name="visibilidad" id="visibilidad">
                <option value="publico">🟢 Público</option>
                <option value="seguidores">🟡 Solo seguidores</option>
                <option value="privado">🔴 Privado</option>
            </select>


            <label class="subirImg">Añadir imágenes (máx. 5)</label>
            <div class="imgs">
                <label class="cajaImg">
                    <p>Añadir imagen</p>
                    <img class="img"/>
                    <input type="file" accept="image/*">
                </label>

                <label class="cajaImg">
                    <p>Añadir imagen</p>
                    <img class="img"/>
                    <input type="file" accept="image/*">
                </label>

                <label class="cajaImg">
                    <p>Añadir imagen</p>
                    <img class="img"/>
                    <input type="file" accept="image/*">
                </label>

                <label class="cajaImg">
                    <p>Añadir imagen</p>
                    <img class="img"/>
                    <input type="file" accept="image/*">
                </label>

                <label class="cajaImg">
                    <p>Añadir imagen</p>
                    <img class="img"/>
                    <input type="file" accept="image/*">
                </label>
            </div>

            <label for="titulo">Título de la publicación</label>
            <input type="text" name="titulo" id="titulo" required>

            <label for="descripcion">Descripción</label>
            <textarea name="descripcion" id="descripcion" placeholder="Escribe el pie de foto."></textarea><br>

            <label for="ubicacion">Ubicación</label>
            <input type="text" name="ubicacion" id="ubicacion">

            <label for="etiquetas">Etiquetas</label>
            <input type="text" name="etiquetas" id="etiquetas">

            <label for="fecha">Fecha</label>
            <input type="date" name="fecha" id="fecha">

            <div id="botones">
                <button id="cancelar" type="button" href="home.html">Cancelar</button>
                <button id="guardar" type="submit">Publicar</button>
            </div>
        </form>
    </div>

    <footer>
        <div id="paginasFooter">
            <a href="">Sobre Vermi</a>
            <a href="">Contacta con nosotros</a>
            <a href="">Política de privacidad</a>
        </div>

        <div id="logoYCopyFooter">
            <div class="Logo-eslogan-footer">
                <img src="assets/vermiLogo.png" alt="logo" id="logo-footer">
                <div id="textoLogo">
                    <p>VERMI</p>
                    <p>Recuerda en voz alta</p>
                </div>
            </div>
            <p>© Todos los derechos reservados.</p>
        </div>
    </footer>
</body>

</html>
